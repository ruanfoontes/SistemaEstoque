<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/main/resources/static/css/style.css">
    <link rel="shortcut icon" href="/src/main/resources/static/image/caixas.png" type="image/x-icon">
    <title>Sistema Estoque</title>
</head>

<body>

    <section>

        <div class="container">

            <form method="post" class="validator" data-endpoint="/register">
                <h2 class="title">Login</h2>
                <label>
                    <input type="email" placeholder="Email" id="input-email" data-rules="required|email" name="email">
                </label>

                <label>
                    <input type="password" placeholder="Password" id="input-pass"  data-rules="required|min=6" name="password">
                </label>

                <label>
                    <button type="submit" class="bnt-login" style="margin-top: 10px;">Login</button>
                </label>

                <div class="cadastro">
                    <span id="register">Ainda não tem uma conta? <a href="register.html">Cadastre-se</a></span>
                </div>
            </form>
        </div>

    </section>

    <script src="javascript/script.js"></script>
</body>

</html>

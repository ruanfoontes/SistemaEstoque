<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="image/caixas.png" type="image/x-icon">
    <script src="https://kit.fontawesome.com/2e5602d94c.js" crossorigin="anonymous"></script>
    <title>Sistema Estoque</title>
</head>

<body>

    <section>

        <div class="container">

            <form method="post" class="validator" data-endpoint="/login">
                <h2 class="title"><i class="fas fa-sign-in-alt"></i> Login</h2>
                <label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email" id="input-email" data-rules="required|email" name="email">
                </label>

                <label>
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" id="input-pass" data-rules="required|min=6"
                        name="password">
                </label>

                <label>
                    <button type="submit" class="bnt-login" style="margin-top: 10px;">Login</button>
                </label>

                <div class="cadastro">
                    <span id="register">Ainda não tem uma conta? <a href="register.html">Cadastre-se</a></span>
                </div>
            </form>
        </div>



        <div class="social-container">
            <a href="https://github.com/ruanfoontes/SistemaEstoque" target="_blank" class="social-link">
                <i class="fab fa-github social-icon"></i>
            </a>

            <div class="linkedin-wrapper">
                <button id="btn-linkedin" class="social-icon" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></button>

                <div class="dev-menu" id="menu-devs">
                    <span class="menu-title">Desenvolvedores</span>
                    <a href="https://www.linkedin.com/in/ruanfoontes308/" target="_blank"><i class="fas fa-user"></i> Ruan Fontes</a>
                    <a href="https://www.linkedin.com/in/cristian-luis-89a734367/" target="_blank"><i class="fas fa-user"></i> Cristian</a>
                    <a href="https://www.linkedin.com/in/darlisson-robert-3b089a338/" target="_blank"><i class="fas fa-user"></i> Darlisson</a>
                </div>
            </div>
        </div>

    </section>





    <script src="javascript/script.js">
        
    </script>
</body>

</html>

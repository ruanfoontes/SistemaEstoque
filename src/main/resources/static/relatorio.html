<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/relatorio.css">
    <link rel="shortcut icon" href="image/caixas.png" type="image/x-icon">
    <script src="https://kit.fontawesome.com/2e5602d94c.js" crossorigin="anonymous"></script>
    <title>Sistema Estoque</title>
</head>

<body>

    <header>
        <h1><i class="fas fa-warehouse"></i> Sistema de Estoque</h1>
        <nav>
            <ul>
                <li><a href="homepage.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="produtos.html" class="nav-item"><i class="fas fa-boxes"></i> Produtos</a></li>
                <li><a href="relatorio.html" class="nav-item active"><i class="fas fa-exchange-alt"></i>Entradas/Saídas</a></li>
                <li><a href="configuracoes.html" class="nav-item"><i class="fas fa-cog"></i> Configurações</a></li>
            </ul>
        </nav>
    </header>


    <main>
        <aside>
            <h2>Categorias</h2>
            <section>
                <input type="text" placeholder="Search">
                <button type="button"><i class="fas fa-search"></i> Pesquisar</button>
            </section>
            <ul class="category-list">
                <li><i class="fas fa-layer-group"></i> Todos</li>
                <li><i class="fas fa-tv"></i> Eletrônicos</li>
                <li><i class="fas fa-apple-alt"></i> Alimentos</li>
                <li><i class="fas fa-tshirt"></i> Vestuário</li>
                <li><i class="fas fa-pen-fancy"></i> Material de Escritório</li>
            </ul>
        </aside>
        <div class="main-container">
            <div class="tabs-navigation">
                <button id="btn-tab-produtos" class="tab-link active" onclick="switchTab('produtos')">Produtos</button>
                <button id="btn-tab-relatorio" class="tab-link" onclick="switchTab('relatorio')">Relatório
                    Entrada/Saída</button>
            </div>

            <div class="content-wrapper">
                <div id="section-produtos" class="tab-content active">
                    <div class="product-card-green">
                        <span class="product-title">Camiseta Oversized</span>
                        <div class="action-buttons">
                            <button class="btn-action btn-entrada"
                                onclick="registrarAcao('Camiseta Oversized', 'Entrada')">Entrada</button>
                            <button class="btn-action btn-saida"
                                onclick="registrarAcao('Camiseta Oversized', 'Saída')">Saída</button>
                        </div>
                    </div>
                </div>

                <div id="section-relatorio" class="tab-content">
                    <table class="custom-table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Produto</th>
                                <th>Tipo</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-logs">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <footer>
         <p>© 2026 ECO-STOCK. Todos os direitos reservados.</p>

    </footer>
    <script src="javascript/script.js"></script>
</body>

</html>

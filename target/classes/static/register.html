<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="image/caixas.png" type="image/x-icon">
    <title>Sistema Estoque</title>
</head>

<body>
    <section>
        <div class="container">

            <form method="post" class="validator" data-endpoint="/register">
                <h2 class="title">Cadastre-se</h2>
                <label>
                    <input type="text" placeholder="Usuario" id="input-user" data-rules="required|min=2" name="name">
                </label>
                <label>
                    <input type="email" placeholder="Email" id="input-email" data-rules="required|email">
                </label>

                <label>
                    <input type="password" placeholder="Password" id="input-pass" data-rules="required|min=6">
                </label>

                <label>
                    <div class="termos-servico">
                        <input type="checkbox" name="check" id="check-direitos" data-rules="required|checked">
                        <span><a href="">Li e concordo com os termos de serviço</a></span>
                    </div>
                </label>

                <label>
                    <button type="submit" class="bnt-login">Cadastrar</button>
                </label>

                <div class="cadastro">
                    <span id="register">Ainda não tem uma conta? <a href="index.html">Faça login</a></span>
                </div>
            </form>
        </div>

        <div class="social-container">
            <a href="https://github.com/ruanfoontes/SistemaEstoque" target="_blank">
                <img src="image/github.png" class="social-icon" alt="GitHub">
            </a>

            <div class="linkedin-wrapper">
                <img src="image/linkedin.png" class="social-icon" id="btn-linkedin" alt="LinkedIn">

                <div class="dev-menu" id="menu-devs">
                    <span class="menu-title">Desenvolvedores</span>
                    <a href="linkedin.com/in/ruanfoontes308" target="_blank">👤 Ruan Fontes</a>
                    <a href="LINK_DEV_2" target="_blank">👤 Cristian</a>
                    <a href="https://www.linkedin.com/in/darlisson-robert-3b089a338/" target="_blank">👤 Darlisson</a>
                </div>
            </div>
        </div>

    </section>

    <script src="javascript/script.js"></script>
</body>

</html>

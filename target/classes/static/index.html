<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="image/caixas.png" type="image/x-icon">
    <title>Sistema Estoque</title>
</head>

<body>

    <section>

        <div class="container">

            <form method="post" class="validator" data-endpoint="/login">
                <h2 class="title">Login</h2>
                <label>
                    <input type="email" placeholder="Email" id="input-email" data-rules="required|email" name="email">
                </label>

                <label>
                    <input type="password" placeholder="Password" id="input-pass" data-rules="required|min=6"
                        name="password">
                </label>

                <label>
                    <button type="submit" class="bnt-login" style="margin-top: 10px;">Login</button>
                </label>

                <div class="cadastro">
                    <span id="register">Ainda não tem uma conta? <a href="register.html">Cadastre-se</a></span>
                </div>
            </form>
        </div>



        <div class="social-container">
            <a href="https://github.com/ruanfoontes/SistemaEstoque" target="_blank">
                <img src="image/github.png" class="social-icon" alt="GitHub">
            </a>

            <div class="linkedin-wrapper">
                <img src="image/linkedin.png" class="social-icon" id="btn-linkedin" alt="LinkedIn">

                <div class="dev-menu" id="menu-devs">
                    <span class="menu-title">Desenvolvedores</span>
                    <a href="https://www.linkedin.com/in/ruanfoontes308/" target="_blank">👤 Ruan Fontes</a>
                    <a href="https://www.linkedin.com/in/cristian-luis-89a734367/" target="_blank">👤 Cristian</a>
                    <a href="https://www.linkedin.com/in/darlisson-robert-3b089a338/" target="_blank">👤 Darlisson</a>
                </div>
            </div>
        </div>

    </section>





    <script src="javascript/script.js">
        
    </script>
</body>

</html>
